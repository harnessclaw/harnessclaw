name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: mac
            arch: arm64
            build_args: --mac --arm64
          - runner: macos-15-intel
            platform: mac
            arch: x64
            build_args: --mac --x64
          - runner: windows-latest
            platform: win
            arch: x64
            build_args: --win --x64

    runs-on: ${{ matrix.runner }}

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_RELEASE_OWNER: ${{ github.repository_owner }}
      GH_RELEASE_REPO: ${{ github.event.repository.name }}
      GH_RELEASE_TYPE: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare macOS signing environment
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -n "${{ secrets.CSC_LINK }}" ]; then
            echo "CSC_LINK=${{ secrets.CSC_LINK }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.CSC_KEY_PASSWORD }}" ]; then
            echo "CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.APPLE_ID }}" ]; then
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" ]; then
            echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.APPLE_API_KEY }}" ]; then
            echo "APPLE_API_KEY=${{ secrets.APPLE_API_KEY }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.APPLE_API_KEY_ID }}" ]; then
            echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.APPLE_API_ISSUER }}" ]; then
            echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.APPLE_KEYCHAIN_PROFILE }}" ]; then
            echo "APPLE_KEYCHAIN_PROFILE=${{ secrets.APPLE_KEYCHAIN_PROFILE }}" >> "$GITHUB_ENV"
          fi

      - name: Download latest harnessclaw-engine release
        run: node scripts/download-harnessclaw-engine-release.cjs resources/bin

      - name: Build and Publish
        shell: bash
        run: |
          BUILD_ARGS="${{ matrix.build_args }}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
            yarn build
            npx electron-builder --config electron-builder.config.cjs $BUILD_ARGS --publish always -c.extraMetadata.version="$RELEASE_VERSION"
          else
            yarn build
            npx electron-builder --config electron-builder.config.cjs $BUILD_ARGS --publish always
          fi

      - name: Generate Homebrew metadata
        if: runner.os == 'macOS' && github.ref_type == 'tag'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_PATH="release/HarnessClaw-${VERSION}-mac-${{ matrix.arch }}.zip"
          SHA256="$(shasum -a 256 "$ZIP_PATH" | awk '{print $1}')"
          mkdir -p homebrew-metadata
          cat > "homebrew-metadata/${{ matrix.arch }}.json" <<JSON
          {
            "version": "${VERSION}",
            "arch": "${{ matrix.arch }}",
            "sha256": "${SHA256}",
            "asset": "$(basename "$ZIP_PATH")"
          }
          JSON

      - name: Upload Homebrew metadata
        if: runner.os == 'macOS' && github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-metadata-${{ matrix.arch }}
          path: homebrew-metadata/${{ matrix.arch }}.json
          if-no-files-found: error

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harnessclaw-${{ matrix.runner }}-${{ github.ref_name || github.sha }}
          path: release/**
          if-no-files-found: error

  update-homebrew-tap:
    needs: release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Download Homebrew metadata
        uses: actions/download-artifact@v4
        with:
          pattern: homebrew-metadata-*
          merge-multiple: true
          path: homebrew-metadata

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: harnessclaw/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update cask
        run: |
          node scripts/sync-homebrew-tap.cjs \
            --metadata-dir homebrew-metadata \
            --tap-dir homebrew-tap \
            --source-repo "${{ github.repository }}"

      - name: Commit and push tap changes
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/harnessclaw.rb
          if git diff --cached --quiet; then
            echo "No Homebrew tap changes to commit"
            exit 0
          fi
          git commit -m "harnessclaw ${GITHUB_REF_NAME#v}"
          git push
