name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: mac
            arch: arm64
            build_args: --mac --arm64
          - runner: macos-15-intel
            platform: mac
            arch: x64
            build_args: --mac --x64
          - runner: windows-latest
            platform: win
            arch: x64
            build_args: --win --x64

    runs-on: ${{ matrix.runner }}

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_RELEASE_OWNER: ${{ github.repository_owner }}
      GH_RELEASE_REPO: ${{ github.event.repository.name }}
      GH_RELEASE_TYPE: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Build generated changelog files
        run: yarn changelog:build

      - name: Prepare macOS signing environment
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -n "${{ secrets.CSC_LINK }}" ]; then
            echo "CSC_LINK=${{ secrets.CSC_LINK }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.CSC_KEY_PASSWORD }}" ]; then
            echo "CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          fi

          has_api_key_secret=false
          if [ -n "${{ secrets.APPLE_API_KEY }}" ] || [ -n "${{ secrets.APPLE_API_KEY_ID }}" ] || [ -n "${{ secrets.APPLE_API_ISSUER }}" ]; then
            has_api_key_secret=true
          fi

          if [ "$has_api_key_secret" = true ] && {
            [ -z "${{ secrets.APPLE_API_KEY }}" ] ||
            [ -z "${{ secrets.APPLE_API_KEY_ID }}" ] ||
            [ -z "${{ secrets.APPLE_API_ISSUER }}" ];
          }; then
            echo "Incomplete Apple notarization secrets. APPLE_API_KEY, APPLE_API_KEY_ID, and APPLE_API_ISSUER must be configured together."
            exit 1
          fi

          if [ "$has_api_key_secret" = true ]; then
            api_key_path="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
            printf '%s' "${{ secrets.APPLE_API_KEY }}" > "$api_key_path"
            chmod 600 "$api_key_path"
            echo "APPLE_API_KEY=$api_key_path" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}" >> "$GITHUB_ENV"
            echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> "$GITHUB_ENV"
            echo "MACOS_NOTARIZE_MODE=api-key" >> "$GITHUB_ENV"
          else
            echo "MACOS_NOTARIZE_MODE=disabled" >> "$GITHUB_ENV"
          fi

      - name: Report macOS notarization mode
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "Using macOS notarization mode: ${MACOS_NOTARIZE_MODE:-disabled}"

      - name: Download latest harnessclaw-engine release
        run: node scripts/download-harnessclaw-engine-release.cjs resources/bin

      - name: Prepare GitHub release notes
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/extract-changelog.cjs --version "$VERSION" --locale bilingual > release-notes.md

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          fi

      - name: Build and Publish
        shell: bash
        run: |
          BUILD_ARGS="${{ matrix.build_args }}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
            yarn build
            npx electron-builder --config electron-builder.config.cjs $BUILD_ARGS --publish always -c.extraMetadata.version="$RELEASE_VERSION"
          else
            yarn build
            npx electron-builder --config electron-builder.config.cjs $BUILD_ARGS --publish always
          fi

      - name: Verify mac update metadata
        if: runner.os == 'macOS' && github.ref_type == 'tag'
        shell: bash
        run: |
          if [ ! -f "release/latest-mac.yml" ]; then
            echo "Missing release/latest-mac.yml"
            ls -la release || true
            exit 1
          fi

      - name: Upload update metadata to GitHub release
        if: runner.os == 'macOS' && github.ref_type == 'tag'
        shell: bash
        run: |
          shopt -s nullglob
          files=(release/latest*.yml release/*.blockmap)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No update metadata files found to upload"
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber

      - name: Generate Homebrew metadata
        if: runner.os == 'macOS' && github.ref_type == 'tag'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_PATH="release/HarnessClaw-${VERSION}-mac-${{ matrix.arch }}.zip"
          SHA256="$(shasum -a 256 "$ZIP_PATH" | awk '{print $1}')"
          mkdir -p homebrew-metadata
          cat > "homebrew-metadata/${{ matrix.arch }}.json" <<JSON
          {
            "version": "${VERSION}",
            "arch": "${{ matrix.arch }}",
            "sha256": "${SHA256}",
            "asset": "$(basename "$ZIP_PATH")"
          }
          JSON

      - name: Upload Homebrew metadata
        if: runner.os == 'macOS' && github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-metadata-${{ matrix.arch }}
          path: homebrew-metadata/${{ matrix.arch }}.json
          if-no-files-found: error

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harnessclaw-${{ matrix.runner }}-${{ github.ref_name || github.sha }}
          path: release/**
          if-no-files-found: error

  update-homebrew-tap:
    needs: release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Download Homebrew metadata
        uses: actions/download-artifact@v4
        with:
          pattern: homebrew-metadata-*
          merge-multiple: true
          path: homebrew-metadata

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: harnessclaw/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update cask
        run: |
          node scripts/sync-homebrew-tap.cjs \
            --metadata-dir homebrew-metadata \
            --tap-dir homebrew-tap \
            --source-repo "${{ github.repository }}"

      - name: Commit and push tap changes
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/harnessclaw.rb
          if git diff --cached --quiet; then
            echo "No Homebrew tap changes to commit"
            exit 0
          fi
          git commit -m "harnessclaw ${GITHUB_REF_NAME#v}"
          git push
