name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: mac
            arch: arm64
            build_args: --mac --arm64
          - runner: macos-15-intel
            platform: mac
            arch: x64
            build_args: --mac --x64
          - runner: windows-latest
            platform: win
            arch: x64
            build_args: --win --x64

    runs-on: ${{ matrix.runner }}

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_RELEASE_OWNER: ${{ github.repository_owner }}
      GH_RELEASE_REPO: ${{ github.event.repository.name }}
      GH_RELEASE_TYPE: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Build generated changelog files
        run: yarn changelog:build

      - name: Prepare macOS signing environment
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -n "${{ secrets.CSC_LINK }}" ]; then
            echo "CSC_LINK=${{ secrets.CSC_LINK }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.CSC_KEY_PASSWORD }}" ]; then
            echo "CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          fi

      - name: Configure macOS notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          require_notarization=false
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            require_notarization=true
          fi

          has_any_api_key_secret=false
          if [ -n "${{ secrets.APPLE_API_KEY }}" ] || [ -n "${{ secrets.APPLE_API_KEY_ID }}" ] || [ -n "${{ secrets.APPLE_API_ISSUER }}" ]; then
            has_any_api_key_secret=true
          fi

          if [ "$has_any_api_key_secret" = true ] && {
            [ -z "${{ secrets.APPLE_API_KEY }}" ] ||
            [ -z "${{ secrets.APPLE_API_KEY_ID }}" ] ||
            [ -z "${{ secrets.APPLE_API_ISSUER }}" ];
          }; then
            echo "Incomplete Apple notarization secrets. APPLE_API_KEY, APPLE_API_KEY_ID, and APPLE_API_ISSUER must be configured together."
            exit 1
          fi

          if [ "$require_notarization" = true ] && [ "$has_any_api_key_secret" = false ]; then
            echo "Missing Apple notarization secrets for tagged release. Refusing to publish a macOS release without notarization."
            exit 1
          fi

          if [ "$has_any_api_key_secret" = false ]; then
            echo "MACOS_NOTARIZE_MODE=disabled" >> "$GITHUB_ENV"
            exit 0
          fi

          api_key_path="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          printf '%s' "${{ secrets.APPLE_API_KEY }}" > "$api_key_path"
          chmod 600 "$api_key_path"

          # Normalize common secret storage variants:
          # 1. GitHub secret saved with escaped '\n' instead of real newlines
          # 2. CRLF line endings pasted from another environment
          if grep -q '\\n' "$api_key_path"; then
            python3 -c 'from pathlib import Path; import sys; p = Path(sys.argv[1]); t = p.read_text(); t = t.replace("\\r\\n", "\n").replace("\\n", "\n").replace("\r\n", "\n"); p.write_text(t)' "$api_key_path"
          fi

          python3 -c 'from pathlib import Path; import sys; p = Path(sys.argv[1]); t = p.read_text(); t = t.replace("\r\n", "\n"); p.write_text(t)' "$api_key_path"

          if ! grep -q "BEGIN PRIVATE KEY" "$api_key_path" || ! grep -q "END PRIVATE KEY" "$api_key_path"; then
            echo "::error::APPLE_API_KEY is not a valid .p8 private key after normalization. Store the raw AuthKey_*.p8 file contents in the GitHub secret."
            exit 1
          fi

          if ! xcrun notarytool store-credentials "harnessclaw-notary" \
            --key "$api_key_path" \
            --key-id "${{ secrets.APPLE_API_KEY_ID }}" \
            --issuer "${{ secrets.APPLE_API_ISSUER }}"; then
            echo "::error::Failed to validate Apple notarization credentials with notarytool. Check APPLE_API_KEY, APPLE_API_KEY_ID, and APPLE_API_ISSUER."
            exit 1
          fi

          echo "APPLE_KEYCHAIN_PROFILE=harnessclaw-notary" >> "$GITHUB_ENV"
          echo "MACOS_NOTARIZE_MODE=keychain-profile" >> "$GITHUB_ENV"

      - name: Report macOS notarization mode
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "Using macOS notarization mode: ${MACOS_NOTARIZE_MODE:-disabled}"

      - name: Download latest harnessclaw-engine release
        run: node scripts/download-harnessclaw-engine-release.cjs resources/bin

      - name: Prepare GitHub release notes
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/extract-changelog.cjs --version "$VERSION" --locale bilingual > release-notes.md

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          fi

      - name: Build and Publish
        shell: bash
        run: |
          BUILD_ARGS="${{ matrix.build_args }}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
            yarn build
            npx electron-builder --config electron-builder.config.cjs $BUILD_ARGS --publish always -c.extraMetadata.version="$RELEASE_VERSION"
          else
            yarn build
            npx electron-builder --config electron-builder.config.cjs $BUILD_ARGS --publish always
          fi

      - name: Verify mac update metadata
        if: runner.os == 'macOS' && github.ref_type == 'tag'
        shell: bash
        run: |
          if [ ! -f "release/latest-mac.yml" ]; then
            echo "Missing release/latest-mac.yml"
            ls -la release || true
            exit 1
          fi

      - name: Validate macOS app notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${MACOS_NOTARIZE_MODE:-disabled}" = "disabled" ]; then
            echo "Skipping notarization validation because notarization is disabled."
            exit 0
          fi

          app_path="$(find release -maxdepth 2 -name 'HarnessClaw.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "Unable to find packaged HarnessClaw.app in release output."
            find release -maxdepth 2 -print
            exit 1
          fi

          xcrun stapler validate "$app_path"

      - name: Prepare mac update metadata artifact
        if: runner.os == 'macOS' && github.ref_type == 'tag'
        shell: bash
        run: |
          mkdir -p mac-update-metadata
          cp "release/latest-mac.yml" "mac-update-metadata/latest-${{ matrix.arch }}-mac.yml"

      - name: Upload mac update metadata artifact
        if: runner.os == 'macOS' && github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: mac-update-metadata-${{ matrix.arch }}
          path: mac-update-metadata/latest-${{ matrix.arch }}-mac.yml
          if-no-files-found: error

      - name: Generate Homebrew metadata
        if: runner.os == 'macOS' && github.ref_type == 'tag'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_PATH="release/HarnessClaw-${VERSION}-mac-${{ matrix.arch }}.zip"
          SHA256="$(shasum -a 256 "$ZIP_PATH" | awk '{print $1}')"
          mkdir -p homebrew-metadata
          cat > "homebrew-metadata/${{ matrix.arch }}.json" <<JSON
          {
            "version": "${VERSION}",
            "arch": "${{ matrix.arch }}",
            "sha256": "${SHA256}",
            "asset": "$(basename "$ZIP_PATH")"
          }
          JSON

      - name: Upload Homebrew metadata
        if: runner.os == 'macOS' && github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-metadata-${{ matrix.arch }}
          path: homebrew-metadata/${{ matrix.arch }}.json
          if-no-files-found: error

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harnessclaw-${{ matrix.runner }}-${{ github.ref_name || github.sha }}
          path: release/**
          if-no-files-found: error

  update-homebrew-tap:
    needs:
      - release
      - publish-mac-update-metadata
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Download Homebrew metadata
        uses: actions/download-artifact@v4
        with:
          pattern: homebrew-metadata-*
          merge-multiple: true
          path: homebrew-metadata

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: harnessclaw/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update cask
        run: |
          node scripts/sync-homebrew-tap.cjs \
            --metadata-dir homebrew-metadata \
            --tap-dir homebrew-tap \
            --source-repo "${{ github.repository }}"

      - name: Commit and push tap changes
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/harnessclaw.rb
          if git diff --cached --quiet; then
            echo "No Homebrew tap changes to commit"
            exit 0
          fi
          git commit -m "harnessclaw ${GITHUB_REF_NAME#v}"
          git push

  publish-mac-update-metadata:
    needs: release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Download mac update metadata artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mac-update-metadata-*
          merge-multiple: true
          path: mac-update-metadata

      - name: Build merged mac update metadata
        shell: bash
        run: |
          node scripts/merge-mac-update-metadata.cjs \
            mac-update-metadata/latest-arm64-mac.yml \
            mac-update-metadata/latest-x64-mac.yml \
            mac-update-metadata/latest-mac.yml

      - name: Upload mac update metadata to GitHub release
        shell: bash
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            mac-update-metadata/latest-arm64-mac.yml \
            mac-update-metadata/latest-x64-mac.yml \
            mac-update-metadata/latest-mac.yml \
            --clobber
