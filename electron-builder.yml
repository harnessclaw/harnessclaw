appId: com.iflytek.harnessclaw
productName: HarnessClaw
copyright: Copyright (c) 2026 HarnessClaw

directories:
  output: dist
  buildResources: resources

electronDist: node_modules/electron/dist

electronDownload:
  mirror: https://github.com/electron/electron/releases/download/

files:
  - out/**/*
  - package.json

extraResources:
  - from: build/bundled-tools/nanobot
    to: bundled-tools/nanobot
    filter:
      - '**/*'

asarUnpack:
  - node_modules/better-sqlite3/**/*
  - '**/*.node'

win:
  target:
    - target: nsis
      arch:
        - x64
  executableName: HarnessClaw

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: HarnessClaw
  uninstallDisplayName: HarnessClaw

artifactName: ${productName}-${version}-${arch}.${ext}
